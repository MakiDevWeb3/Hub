<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Maki social card</title>
  <desc id="desc">Professional social preview for the Maki hub and trailer pages with the Tensor icon highlighted.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070d"/>
      <stop offset="55%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#050812"/>
    </linearGradient>
    <radialGradient id="glowA" cx="18%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#98e4ff" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#98e4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="88%" cy="16%" r="45%">
      <stop offset="0%" stop-color="#8ca5ff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#8ca5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="68%" cy="88%" r="42%">
      <stop offset="0%" stop-color="#c5b8ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c5b8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#98e4ff" stop-opacity="0.64"/>
      <stop offset="100%" stop-color="#8ca5ff" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f3efe2"/>
      <stop offset="100%" stop-color="#dbd3c4"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="iconClip">
      <circle cx="0" cy="0" r="68"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>
  <rect width="1200" height="630" fill="url(#glowC)"/>

  <g opacity="0.16">
    <path d="M0 88H1200M0 160H1200M0 232H1200M0 304H1200M0 376H1200M0 448H1200M0 520H1200" stroke="#ffffff"/>
    <path d="M120 0V630M264 0V630M408 0V630M552 0V630M696 0V630M840 0V630M984 0V630M1128 0V630" stroke="#ffffff"/>
  </g>

  <rect x="58" y="58" width="1084" height="514" rx="34" fill="#0d1320" fill-opacity="0.72" stroke="url(#stroke)"/>

  <g transform="translate(96 104)">
    <rect x="0" y="0" width="160" height="38" rx="19" fill="#101828" stroke="#2b3a52"/>
    <text x="80" y="25" text-anchor="middle" fill="#98e4ff" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="4">MAKI HUB</text>

    <text x="0" y="122" fill="#f7f9ff" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="800" letter-spacing="-3">
      Un hub plus net.
    </text>
    <text x="0" y="202" fill="#d8e0f2" font-family="Inter, Arial, sans-serif" font-size="66" font-weight="600" letter-spacing="-2">
      Un trailer plus propre.
    </text>

    <text x="0" y="278" fill="#8a96b4" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="500">
      Parcours unifie, redirections propres, identite premium.
    </text>

    <g transform="translate(0 340)">
      <rect width="294" height="58" rx="29" fill="url(#pill)"/>
      <text x="147" y="38" text-anchor="middle" fill="#111826" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">
        hub.tobeamaki.store
      </text>
    </g>
  </g>

  <g transform="translate(880 170)">
    <circle cx="120" cy="120" r="146" fill="#0d1523" stroke="#3a4a62" stroke-width="2"/>
    <circle cx="120" cy="120" r="116" fill="#0a101a"/>

    <g filter="url(#softGlow)">
      <path d="M48 182L92 94L164 72L212 124L186 206L104 220Z" fill="none" stroke="url(#stroke)" stroke-width="4"/>
      <path d="M92 94L104 220M164 72L186 206M48 182L212 124" fill="none" stroke="#98e4ff" stroke-opacity="0.42" stroke-width="2"/>
      <circle cx="48" cy="182" r="8" fill="#98e4ff"/>
      <circle cx="92" cy="94" r="8" fill="#c5b8ff"/>
      <circle cx="164" cy="72" r="8" fill="#98e4ff"/>
      <circle cx="212" cy="124" r="8" fill="#8ca5ff"/>
      <circle cx="186" cy="206" r="8" fill="#98e4ff"/>
      <circle cx="104" cy="220" r="8" fill="#8ca5ff"/>
    </g>

    <g transform="translate(120 120)">
      <circle r="76" fill="#111a2a" stroke="#445470"/>
      <image
        href="https://prod-image-cdn.tensor.trade/images/slug=2c6c34a6-a621-4c5c-a47c-af0aac421579/400x400/freeze=false/https%3A%2F%2Fgateway.irys.xyz%2FCeRVqfexaq6KLjhwmfoS9aE4mgQL9Txv5ToTV9CzAG5n"
        x="-68"
        y="-68"
        width="136"
        height="136"
        preserveAspectRatio="xMidYMid slice"
        clip-path="url(#iconClip)"
      />
    </g>
  </g>

  <g transform="translate(734 468)">
    <rect width="326" height="56" rx="20" fill="#0f1727" stroke="#33445d"/>
    <text x="30" y="24" fill="#98e4ff" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="2">TENSOR ICON</text>
    <text x="30" y="42" fill="#d7dff1" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="600">identite visuelle premium</text>
  </g>
</svg>
